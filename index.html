<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saltz Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<article class="todo-card" data-testid="test-todo-card" role="region" aria-label="Task card">

  <div class="top-row">
    <label class="check-wrap" aria-label="Mark task as complete">
      <input
        type="checkbox"
        class="todo-complete-toggle"
        role="checkbox"
        data-testid="test-todo-complete-toggle"
        aria-label="Mark complete"
      />
    </label>

    <div class="title-block">
      <h2 class="todo-title" data-testid="test-todo-title">Redesign onboarding flow</h2>
      <div class="badge-row">
        <span class="todo-status" data-testid="test-todo-status" aria-label="Status: In Progress">In Progress</span>
        <span class="todo-priority priority-high" data-testid="test-todo-priority" aria-label="Priority: High">High</span>
      </div>
    </div>

    <div class="actions">
      <button
        class="todo-edit-button"
        data-testid="test-todo-edit-button"
        aria-label="Edit task"
        onclick="console.log('edit clicked')"
      >Edit</button>
      <button
        class="todo-delete-button"
        data-testid="test-todo-delete-button"
        aria-label="Delete task"
        onclick="alert('Delete clicked')"
      >Delete</button>
    </div>
  </div>

  <hr />

  <p class="todo-description" data-testid="test-todo-description">
    Map out the full user journey from signup to first value moment. Include
    edge cases for mobile and low-bandwidth scenarios.
  </p>

  <div class="date-row">
    <div class="date-chip">
      <div class="dot blue"></div>
      <time class="todo-due-date" data-testid="test-todo-due-date" datetime="2026-05-01T18:00:00Z">
        Due May 1, 2026
      </time>
    </div>
    <div class="date-chip" id="time-remaining-chip">
      <div class="dot" id="urgency-dot"></div>
      <time
        class="todo-time-remaining"
        data-testid="test-todo-time-remaining"
        id="time-remaining"
        aria-live="polite"
        datetime="2026-05-01T18:00:00Z"
      ></time>
    </div>
  </div>

  <ul class="todo-tags" data-testid="test-todo-tags" role="list" aria-label="Tags">
    <li class="todo-tag" data-testid="test-todo-tag-work">work</li>
    <li class="todo-tag" data-testid="test-todo-tag-urgent">urgent</li>
    <li class="todo-tag">design</li>
  </ul>

</article>

<script src="script.js"></script>
</body>
</html>
